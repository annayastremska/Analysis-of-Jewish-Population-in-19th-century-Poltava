<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Poltava Governorate — Jewish Population Analysis</title>
<style>
  body { margin: 0; font-family: sans-serif; background: #fafafa; }
  h1 { text-align: center; padding: 20px; font-size: 1.2em; color: #333; margin: 0; background: white; border-bottom: 1px solid #ddd; }
  .tabs { display: flex; flex-wrap: wrap; gap: 6px; padding: 12px 20px; background: white; border-bottom: 1px solid #ddd; }
  .tab { padding: 8px 14px; border: 1px solid #ccc; border-radius: 4px; background: #f0f0f0; cursor: pointer; font-size: 0.85em; }
  .tab.active { background: #333; color: white; border-color: #333; }
</style>
</head>
<body>
<h1>Poltava Governorate — Jewish Population Analysis (19th Century)</h1>
<div class="tabs">
<button class="tab active" onclick="show(0)">% of Jews by District (Map)</button>
<button class="tab " onclick="show(1)">% of Jews per District (Bar)</button>
<button class="tab " onclick="show(2)">Merchants, Jews & Townspeople (Maps)</button>
<button class="tab " onclick="show(3)">Correlation: Jews & Merchants (Scatter)</button>
<button class="tab " onclick="show(4)">Cossacks & Jews (Heatmap)</button>

</div>
<iframe id="chart0" src="map_chart.html" style="display:block;width:100%;height:85vh;border:none;"></iframe>
<iframe id="chart1" src="grouped_bars.html" style="display:none;width:100%;height:85vh;border:none;"></iframe>
<iframe id="chart2" src="maps_merchants_jews_townspeople.html" style="display:none;width:100%;height:85vh;border:none;"></iframe>
<iframe id="chart3" src="scatter_merchants_jews.html" style="display:none;width:100%;height:85vh;border:none;"></iframe>
<iframe id="chart4" src="heatmap_cossacks_jews.html" style="display:none;width:100%;height:85vh;border:none;"></iframe>

<script>
function show(n) {
  document.querySelectorAll('iframe').forEach((f, i) => f.style.display = i === n ? 'block' : 'none');
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
}
</script>
</body>
</html>
